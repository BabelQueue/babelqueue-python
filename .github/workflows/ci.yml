name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install (with Celery + Django adapters)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,celery,django]"

      - name: Run tests
        run: pytest

  integration:
    name: Redis integration
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install (with redis + amqp extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[redis,amqp,dev]"

      - name: Run tests (Redis + RabbitMQ transports included)
        env:
          BABELQUEUE_TEST_REDIS: redis://localhost:6379/0
          BABELQUEUE_TEST_AMQP: amqp://guest:guest@localhost:5672/
        run: pytest
